<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reze con CSS - Lázaro Diaz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene">
    <section class="background"></section>

    <figure class="character">
      <div class="backpack"></div>
      <div class="arm-back"></div>
      <div class="hair hair--back"></div>
      <div class="neck"></div>
      <div class="body"></div>
      <div class="backpack-straps"></div>
      <div class="backpack-straps2"></div>
      <div class="face-shadow"></div>
      <div class="face">
        <div class="eye-shadow eye-shadow--left"></div>
        <div class="eye-shadow eye-shadow--right"></div>
        <span class="eye eye--left">
          <span class="eyelid"></span>
          <span class="pupil"></span>
        </span>
        <span class="eye eye--right">
          <span class="eyelid"></span>
          <span class="pupil"></span>
        </span>
        <div class="nose"></div>
        <div class="blush"></div>
        <div class="smile"></div>
      </div>
      <div class="eyebrow eyebrow--left"></div>
      <div class="eyebrow eyebrow--right"></div>
      <div class="arm">
        <div class="hand1-shadow"></div>
        <div class="hand2-shadow"></div>
        <div class="hand1"></div>
        <div class="stem"></div>
        <div class="hand2"></div>
        <figure class="flower">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="flower__center"></div>
        </figure>
      </div>
      <div class="hair hair--front"></div>
      <div class="hair hair--front2"></div>
      <div class="hair hair--front3"></div>
    </figure>

    <div class="rain"></div>
  </main>
</body>
</html>
